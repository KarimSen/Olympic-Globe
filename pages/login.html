<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Olympic Globe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

  <canvas id="canvas-etoiles"></canvas>

  <div class="fond-lumineux"></div>

  <main class="conteneur-auth">

    <aside class="panneau-marque">
      <div class="interieur-marque">
        <div class="anneaux-logo" aria-hidden="true">
          <span class="anneau ann-bleu"></span>
          <span class="anneau ann-jaune"></span>
          <span class="anneau ann-noir"></span>
          <span class="anneau ann-vert"></span>
          <span class="anneau ann-rouge"></span>
        </div>
        <h2 class="titre-marque">Olympic<br /><em>Globe</em></h2>
        <p class="sous-titre-marque">L'histoire des Jeux<br />au bout du monde</p>
        <ul class="stats-marque" aria-label="Statistiques">
          <li><span class="valeur-stat">33</span><span class="label-stat">éditions</span></li>
          <li class="separateur-stat" aria-hidden="true"></li>
          <li><span class="valeur-stat">206</span><span class="label-stat">nations</span></li>
          <li class="separateur-stat" aria-hidden="true"></li>
          <li><span class="valeur-stat">5</span><span class="label-stat">continents</span></li>
        </ul>
      </div>
    </aside>

    <section class="panneau-formulaire">
      <div class="interieur-formulaire">

        <div class="entete-formulaire">
          <span class="etiquette-formulaire">Bienvenue</span>
          <h1 class="titre-formulaire">Connexion</h1>
          <p class="description-formulaire">Accédez à l'expérience complète des Jeux Olympiques.</p>
        </div>

        <div class="corps-formulaire" id="form-connexion">

          <div class="groupe-champ">
            <label for="champ-email" class="label-champ">Adresse e-mail</label>
            <div class="enveloppe-champ">
              <svg class="icone-champ" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M2.5 5.5A1.5 1.5 0 0 1 4 4h12a1.5 1.5 0 0 1 1.5 1.5v9A1.5 1.5 0 0 1 16 16H4a1.5 1.5 0 0 1-1.5-1.5v-9Z" stroke="currentColor" stroke-width="1.3"/>
                <path d="m2.5 6 7.5 5 7.5-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              <input type="email" id="champ-email" name="champ-email" class="input-champ" placeholder="exemple@email.com" autocomplete="email" required />
            </div>
            <span class="message-erreur" id="msg-erreur-email"></span>
          </div>

          <div class="groupe-champ">
            <div class="ligne-label-champ">
              <label for="champ-mdp" class="label-champ">Mot de passe</label>
              <button type="button" class="lien-mdp-oublie" tabindex="0">Mot de passe oublié ?</button>
            </div>
            <div class="enveloppe-champ">
              <svg class="icone-champ" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <rect x="4" y="9" width="12" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <circle cx="10" cy="13.5" r="1.2" fill="currentColor"/>
              </svg>
              <input type="password" id="champ-mdp" name="champ-mdp" class="input-champ" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="btn-afficher-mdp" id="btn-afficher-mdp" aria-label="Afficher / masquer le mot de passe">
                <svg id="icone-oeil" viewBox="0 0 20 20" fill="none">
                  <ellipse cx="10" cy="10" rx="7.5" ry="4.5" stroke="currentColor" stroke-width="1.3"/>
                  <circle cx="10" cy="10" r="2" fill="currentColor"/>
                </svg>
              </button>
            </div>
            <span class="message-erreur" id="msg-erreur-mdp"></span>
          </div>

          <div class="ligne-se-souvenir">
            <label class="label-case-cocher">
              <input type="checkbox" id="se-souvenir" name="se-souvenir" class="case-cocher-input" />
              <span class="case-cocher-visuelle" aria-hidden="true"></span>
              <span class="texte-case-cocher">Se souvenir de moi</span>
            </label>
          </div>

          <button type="button" class="btn-principal" id="btn-connexion">
            <span class="texte-bouton">Se connecter</span>
            <svg class="fleche-bouton" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

        </div>

        <div class="bloc-succes" id="bloc-succes" aria-live="polite">
          <div class="icone-succes" aria-hidden="true">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" stroke="var(--gold)" stroke-width="1.5"/>
              <path d="m12 20 5.5 5.5L28 14" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p>Connexion réussie, redirection…</p>
        </div>

        <div class="pied-formulaire">
          <span>Pas encore de compte ?</span>
          <a href="register.html" class="lien-pied">Créer un compte</a>
        </div>

      </div>
    </section>

  </main>

  <script src="../js/login.js"></script>
</body>
</html>
