<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription — Olympic Globe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/register.css" />
</head>
<body>

  <canvas id="canvas-etoiles"></canvas>

  <div class="fond-grille" aria-hidden="true"></div>

  <div class="fond-orbe" aria-hidden="true"></div>

  <main class="conteneur-inscription">

    <header class="barre-haut">
      <a href="../index.html" class="logo-nav" aria-label="Retour à l'accueil">
        <div class="anneaux-logo" aria-hidden="true">
          <span class="lr lr-b"></span>
          <span class="lr lr-y"></span>
          <span class="lr lr-k"></span>
          <span class="lr lr-g"></span>
          <span class="lr lr-r"></span>
        </div>
        <span class="texte-logo">Olympic <strong>Globe</strong></span>
      </a>
      <a href="login.html" class="lien-retour">
        <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Connexion
      </a>
    </header>

    <div class="carte-inscription">

      <div class="coin-carte coin-carte--hg" aria-hidden="true"></div>
      <div class="coin-carte coin-carte--bd" aria-hidden="true"></div>

      <div class="entete-carte">
        <span class="etiquette-carte">Rejoindre la communauté</span>
        <h1 class="titre-carte">Créer un compte</h1>
        <p class="sous-titre-carte">
          Explorez l'histoire des Jeux Olympiques et<br />
          <em>restez informé des prochaines éditions.</em>
        </p>
      </div>

      <div class="corps-carte" id="form-inscription">

        <div class="ligne-champs">
          <div class="groupe-champ">
            <label for="prenom" class="label-champ">Prénom</label>
            <div class="enveloppe-champ">
              <svg class="icone-champ" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M3.5 17c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              <input type="text" id="prenom" name="prenom" class="input-champ" placeholder="Prénom" autocomplete="given-name" required />
            </div>
            <span class="message-erreur" id="erreur-prenom"></span>
          </div>

          <div class="groupe-champ">
            <label for="nom" class="label-champ">Nom</label>
            <div class="enveloppe-champ">
              <svg class="icone-champ" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M3.5 17c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              <input type="text" id="nom" name="nom" class="input-champ" placeholder="Nom de famille" autocomplete="family-name" required />
            </div>
            <span class="message-erreur" id="erreur-nom"></span>
          </div>
        </div>

        <div class="groupe-champ">
          <label for="email" class="label-champ">Adresse e-mail</label>
          <div class="enveloppe-champ">
            <svg class="icone-champ" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M2.5 5.5A1.5 1.5 0 0 1 4 4h12a1.5 1.5 0 0 1 1.5 1.5v9A1.5 1.5 0 0 1 16 16H4a1.5 1.5 0 0 1-1.5-1.5v-9Z" stroke="currentColor" stroke-width="1.3"/>
              <path d="m2.5 6 7.5 5 7.5-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <input type="email" id="email" name="email" class="input-champ" placeholder="exemple@email.com" autocomplete="email" required />
          </div>
          <span class="message-erreur" id="erreur-email"></span>
        </div>

        <div class="groupe-champ">
          <label for="password" class="label-champ">Mot de passe</label>
          <div class="enveloppe-champ">
            <svg class="icone-champ" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <rect x="4" y="9" width="12" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <circle cx="10" cy="13.5" r="1.2" fill="currentColor"/>
            </svg>
            <input type="password" id="password" name="password" class="input-champ" placeholder="Min. 8 caractères" autocomplete="new-password" required />
            <button type="button" class="btn-afficher-mdp" id="btn-afficher-mdp" aria-label="Afficher / masquer">
              <svg viewBox="0 0 20 20" fill="none">
                <ellipse cx="10" cy="10" rx="7.5" ry="4.5" stroke="currentColor" stroke-width="1.3"/>
                <circle cx="10" cy="10" r="2" fill="currentColor"/>
              </svg>
            </button>
          </div>
          <div class="barre-force" aria-label="Force du mot de passe">
            <span class="sb sb-1" id="sb1"></span>
            <span class="sb sb-2" id="sb2"></span>
            <span class="sb sb-3" id="sb3"></span>
            <span class="sb sb-4" id="sb4"></span>
          </div>
          <span class="message-erreur" id="erreur-mdp"></span>
        </div>

        <div class="groupe-champ">
          <label for="confirm-password" class="label-champ">Confirmer le mot de passe</label>
          <div class="enveloppe-champ">
            <svg class="icone-champ" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <rect x="4" y="9" width="12" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <path d="m7 13.5 2 2 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="password" id="confirm-password" name="confirm-password" class="input-champ" placeholder="••••••••" autocomplete="new-password" required />
          </div>
          <span class="message-erreur" id="erreur-confirmation"></span>
        </div>

        <div class="bloc-newsletter">
          <label class="label-case-cocher">
            <input type="checkbox" id="newsletter" name="newsletter" class="case-cocher-input" checked />
            <span class="case-cocher-visuelle" aria-hidden="true"></span>
            <span class="texte-case-cocher">
              <strong>Recevoir la newsletter</strong> — Actualités des Jeux, résultats et événements à venir.
            </span>
          </label>
        </div>

        <div class="groupe-champ">
          <label class="label-case-cocher">
            <input type="checkbox" id="conditions" name="conditions" class="case-cocher-input" required />
            <span class="case-cocher-visuelle" aria-hidden="true"></span>
            <span class="texte-case-cocher">
              J'accepte les <button type="button" class="btn-texte">conditions d'utilisation</button>
              et la <button type="button" class="btn-texte">politique de confidentialité</button>.
            </span>
          </label>
          <span class="message-erreur" id="erreur-conditions"></span>
        </div>

        <button type="button" class="btn-principal" id="btn-inscription">
          <span class="texte-bouton">Créer mon compte</span>
          <span class="anneaux-bouton" aria-hidden="true">
            <span class="br br-b"></span>
            <span class="br br-y"></span>
            <span class="br br-k"></span>
            <span class="br br-g"></span>
            <span class="br br-r"></span>
          </span>
        </button>

      </div>

      <div class="ecran-succes" id="ecran-succes" aria-live="polite">
        <div class="anneaux-succes" aria-hidden="true">
          <span class="sr sr-b"></span>
          <span class="sr sr-y"></span>
          <span class="sr sr-k"></span>
          <span class="sr sr-g"></span>
          <span class="sr sr-r"></span>
        </div>
        <h2 class="titre-succes">Bienvenue <span id="nom-succes"></span></h2>
        <p class="sous-titre-succes">Votre compte a été créé. Redirection vers le Globe…</p>
      </div>

      <div class="pied-carte">
        <span>Déjà inscrit ?</span>
        <a href="login.html" class="lien-pied" style="color: var(--gold-light);">Se connecter</a>
      </div>

    </div>

  </main>

  <script src="../js/register.js"></script>
</body>
</html>
